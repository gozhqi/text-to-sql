<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-SQL 智能查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .main-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        
        .message.user {
            align-items: flex-end;
        }
        
        .message.assistant {
            align-items: flex-start;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .message.assistant .message-content {
            background: white;
            border: 1px solid #e0e0e0;
        }
        
        .sql-block {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            overflow-x: auto;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .results-table th,
        .results-table td {
            border: 1px solid #e0e0e0;
            padding: 8px 12px;
            text-align: left;
        }
        
        .results-table th {
            background: #f0f0f0;
            font-weight: 600;
        }
        
        .results-table tr:nth-child(even) {
            background: #fafafa;
        }
        
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
        }
        
        .input-container {
            display: flex;
            gap: 12px;
        }
        
        .input-container input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-container input:focus {
            border-color: #667eea;
        }
        
        .input-container button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .input-container button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .config-bar {
            padding: 16px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .config-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .config-item label {
            font-size: 14px;
            color: #666;
        }
        
        .config-item input,
        .config-item select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .session-info {
            font-size: 12px;
            color: #999;
            margin-left: auto;
        }
        
        .error-message {
            color: #dc3545;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .success-message {
            color: #28a745;
            padding: 10px;
            background: #e6ffe6;
            border-radius: 8px;
            margin: 10px 0;
        }
        
        .examples {
            margin-top: 16px;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 12px;
        }
        
        .examples h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .example-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #667eea;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .example-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .typing {
            display: flex;
            gap: 4px;
            padding: 8px;
        }
        
        .typing span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Text-to-SQL 智能查询</h1>
            <p>用自然语言查询数据库，支持多轮对话</p>
        </div>
        
        <div class="main-card">
            <div class="config-bar">
                <div class="config-item">
                    <label>数据库:</label>
                    <input type="text" id="dbName" value="mydb" placeholder="数据库名称">
                </div>
                <div class="config-item">
                    <button onclick="newSession()" style="padding: 8px 16px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer;">
                        新对话
                    </button>
                </div>
                <div class="session-info" id="sessionInfo">会话ID: --</div>
            </div>
            
            <div class="chat-container" id="chatContainer">
                <div class="message assistant">
                    <div class="message-content">
                        👋 你好！我是Text-to-SQL助手，可以帮你用自然语言查询数据库。
                        <div class="examples">
                            <h4>试试这些示例：</h4>
                            <div class="example-buttons">
                                <button class="example-btn" onclick="askExample('查询最近一个月的订单数量')">查询最近一个月的订单数量</button>
                                <button class="example-btn" onclick="askExample('统计每个产品类别的销售额')">统计每个产品类别的销售额</button>
                                <button class="example-btn" onclick="askExample('找出销售额最高的前10个客户')">找出销售额最高的前10个客户</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="queryInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                    <button id="sendBtn" onclick="sendQuery()">发送</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let sessionId = null;
        const API_BASE = window.location.origin;
        
        async function initSession() {
            try {
                const response = await fetch(`${API_BASE}/api/session/new`);
                const data = await response.json();
                sessionId = data.session_id;
                document.getElementById('sessionInfo').textContent = `会话ID: ${sessionId.substring(0, 8)}...`;
            } catch (error) {
                console.error('初始化会话失败:', error);
            }
        }
        
        function newSession() {
            initSession();
            document.getElementById('chatContainer').innerHTML = `
                <div class="message assistant">
                    <div class="message-content">👋 新对话已开始，请输入你的问题。</div>
                </div>
            `;
        }
        
        async function sendQuery() {
            const input = document.getElementById('queryInput');
            const question = input.value.trim();
            if (!question) return;
            
            const dbName = document.getElementById('dbName').value || 'mydb';
            
            addMessage('user', question);
            input.value = '';
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
            document.getElementById('chatContainer').appendChild(loadingDiv);
            scrollToEnd();
            
            document.getElementById('sendBtn').disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: question,
                        db_name: dbName,
                        session_id: sessionId
                    })
                });
                
                const result = await response.json();
                document.getElementById('loading')?.remove();
                
                if (result.success) {
                    let content = '';
                    if (result.rewritten_question) {
                        content += `<div style="font-size: 12px; color: #666; margin-bottom: 8px;">📝 理解为: ${result.rewritten_question}</div>`;
                    }
                    if (result.sql) {
                        content += `<pre class="sql-block">${escapeHtml(result.sql)}</pre>`;
                    }
                    if (result.explanation) {
                        content += `<div style="margin: 10px 0; color: #333;">${result.explanation}</div>`;
                    }
                    if (result.results && result.results.length > 0) {
                        content += formatResults(result.results);
                        content += `<div style="font-size: 12px; color: #28a745; margin-top: 8px;">✅ 返回 ${result.result_count} 条记录</div>`;
                    }
                    addMessage('assistant', content);
                } else {
                    addMessage('assistant', `<div class="error-message">❌ ${result.error || '处理失败'}</div>`);
                }
            } catch (error) {
                document.getElementById('loading')?.remove();
                addMessage('assistant', `<div class="error-message">❌ 请求失败: ${error.message}</div>`);
            } finally {
                document.getElementById('sendBtn').disabled = false;
            }
        }
        
        function addMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="message-content">${content}</div>`;
            container.appendChild(div);
            scrollToEnd();
        }
        
        function scrollToEnd() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatResults(results) {
            if (!results || results.length === 0) return '';
            const headers = Object.keys(results[0]);
            const maxRows = Math.min(results.length, 20);
            let html = '<div style="overflow-x: auto;"><table class="results-table"><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            for (let i = 0; i < maxRows; i++) {
                html += '<tr>';
                headers.forEach(h => html += `<td>${results[i][h] ?? ''}</td>`);
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            if (results.length > maxRows) {
                html += `<div style="font-size: 12px; color: #666;">显示前 ${maxRows} 条，共 ${results.length} 条</div>`;
            }
            return html;
        }
        
        function askExample(question) {
            document.getElementById('queryInput').value = question;
            sendQuery();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendQuery();
        }
        
        initSession();
    </script>
</body>
</html>
